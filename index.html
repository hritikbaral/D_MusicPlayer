<!DOCTYPE html>
<html>

<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta charset="UTF-8">
    <title>Dino Music</title>
    <link rel="stylesheet" href="style.css">
</head>

<div id="playlistModal" style="
display:flex;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:9999;
">

    <div style="
  background:#1e1e1e;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
  ">

        <h3>Paste Playlist JSON</h3>

        <textarea id="playlistInput" style="width:100%;height:120px;"></textarea>

        <br><br>

        <button onclick="submitPlaylist()">OK</button>
        <button onclick="closePlaylistModal()">Cancel</button>

    </div>
</div>

<body>

    <div class="container">

        <h1>Dino Music Player 2</h1>



        <div class="keys">

            <label>YouTube API Key</label>
            <input id="youtubeKey" placeholder="Enter YouTube API Key">

            <label>Backend Key</label>
            <input id="backendKey" placeholder="Enter Backend Key">

            <button id="saveKeys">Save Keys</button>

            <button id="copyPlaylist">Copy Playlist</button>
            <button id="pastePlaylist">Paste Playlist</button>

        </div>


        <input id="search" placeholder="Search song..." />

        <div id="results"></div>

        <h2>Now Playing PWA Builder App 3</h2>
        <p id="nowPlayingText">Nothing playing</p>


        <audio id="player" controls></audio>

        <div class="player-controls">

            <button id="prevBtn">⏮</button>
            <button id="nextBtn">⏭</button>
            <button id="shuffleToggle">Shuffle: OFF</button>
            <button id="loopToggle">Loop: OFF</button>
        </div>


        <h2>Playlist</h2>

        <div class="playlist-controls">
            <button id="playAll">Play All</button>
        </div>

        <ul id="playlist"></ul>


    </div>

    <script src="script.js"></script>

</body>

</html>
