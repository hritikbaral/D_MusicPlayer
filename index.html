<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>My Music</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Dino Music Player</h1>



<div class="keys">

<label>YouTube API Key</label>
<input id="youtubeKey" placeholder="Enter YouTube API Key">

<label>Backend Key</label>
<input id="backendKey" placeholder="Enter Backend Key">

<button id="saveKeys">Save Keys</button>

<button id="copyPlaylist">Copy Playlist</button>
<button id="pastePlaylist">Paste Playlist</button>

</div>


<input id="search" placeholder="Search song..."/>

<div id="results"></div>

<h2>Now Playing</h2>
<p id="nowPlayingText">Nothing playing</p>


<audio id="player" controls></audio>

<div class="player-controls">

<button id="prevBtn">⏮</button>
<button id="nextBtn">⏭</button>
<button id="shuffleToggle">Shuffle: OFF</button>
<button id="loopToggle">Loop: OFF</button>
</div>


<h2>Playlist</h2>

<div class="playlist-controls">
<button id="playAll">Play All</button>
</div>

<ul id="playlist"></ul>


</div>

<script src="script.js"></script>

</body>
</html>
